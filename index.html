<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAPINCC | Ultimate Video Downloader</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00f0ff;
            --bg-dark: #080810;
            --card-bg: #111122;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .wrapper {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            font-weight: 800;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #8a8ab0;
            font-size: 0.95rem;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Platform loqoları və düzülüş ardıcıllığı */
        .platforms {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            opacity: 0.8;
        }

        .platform-badge {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .insta { color: #e1306c; }
        .tiktok { color: #ff0050; }
        .yt { color: #ff0000; }
        .x-plat { color: #ffffff; }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4);
            color: #fff;
        }

        /* Yüklənmə animasiyası */
        .loader-container {
            display: none;
            margin-top: 25px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            margin: 0 auto 15px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            color: var(--neon-green);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 35px;
            font-size: 0.8rem;
            color: #6a6a8a;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>SWAPINCC</h1>
        <div class="subtitle">High-Quality Video Downloader • No Watermark</div>
        
        <!-- Sənin istədiyin ardıcıllıqla platformalar -->
        <div class="platforms">
            <span class="platform-badge insta">Instagram</span>
            <span class="platform-badge tiktok">TikTok</span>
            <span class="platform-badge yt">YouTube</span>
            <span class="platform-badge x-plat">X / Twitter</span>
        </div>

        <div class="input-box">
            <input type="text" id="videoUrl" placeholder="Paste your video link here...">
        </div>
        
        <button onclick="startDownload()">DOWNLOAD NOW</button>
        
        <!-- Avtomatik yüklənmə prosesi üçün vizual hissə -->
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <div id="statusLabel" class="status-text">Fetching high-quality MP4...</div>
        </div>

        <div class="badges">
            <span>⚡ Ultra Fast</span>
            <span>🔒 Secure</span>
            <span>💎 Best Quality</span>
        </div>
    </div>

    <script>
        function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const loader = document.getElementById('loader');
            const statusLabel = document.getElementById('statusLabel');
            
            if(!url) {
                alert("Please paste a valid video link!");
                return;
            }

            // Düyməyə basanda hər şey avtomatik görünür
            loader.style.display = 'block';
            statusLabel.innerText = "Extracting video without watermark...";
            
            // Bura bir neçə saniyədən sonra backenddən gələn cavabı bağlayacağıq
            console.log("Processing URL: " + url);
        }
    </script>
</body>
</html>
