<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP INC | Premium Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="downloader-box">
        <h1 class="brand-title">MEDIA DOWNLOADER</h1>
        <p class="subtitle">Extract high-quality videos with zero watermark.</p>
        
        <div class="input-wrapper">
            <input type="url" id="mediaUrl" placeholder="Paste link (IG, TikTok, X, YT)..." autocomplete="off" required>
        </div>
        
        <div class="action-buttons">
            <button class="btn primary-btn" onclick="processDownload('mp4')">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Download MP4
            </button>
            <button class="btn secondary-btn" onclick="processDownload('mp3')">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                Audio MP3
            </button>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </main>

    <footer>
        CREATED BY SWAP INC
    </footer>

    <script src="script.js"></script>
</body>
</html>
